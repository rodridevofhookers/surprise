<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Safira</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#111;
      overflow:hidden;
    }

    /* PRIMEIRA TELA */

    .tela1{
      width:100%;
      height:100vh;
      background:#1f7549;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      text-align:center;

      padding:20px;
    }

    .tela1 h1{
      font-size:58px;
      color:white;
      margin-bottom:40px;
      font-weight:800;
    }

    .tela1 button{
      border:none;
      background:white;
      color:#1f7549;

      padding:18px 42px;

      border-radius:40px;

      font-size:18px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;
    }

    .tela1 button:hover{
      transform:scale(1.05);
    }

    /* SEGUNDA TELA */

    .tela2{
      display:none;

      width:100%;
      min-height:100vh;

      background:#1f7549;

      color:white;

      text-align:center;

      padding:40px 25px;

      animation:fade 0.8s ease;
    }

    .texto{
      max-width:500px;
      margin:0 auto 35px;

      font-size:18px;
      line-height:1.8;
    }

    .foto{
      width:100%;
      max-width:350px;

      border-radius:25px;

      object-fit:cover;

      box-shadow:0 0 25px rgba(0,0,0,0.25);
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

  </style>
</head>

<body>

  <!-- PRIMEIRA TELA -->

  <section class="tela1" id="tela1">

    <h1>Para Safira 💚</h1>

    <button onclick="abrir()">
      abrir
    </button>

  </section>

  <!-- SEGUNDA TELA -->

  <section class="tela2" id="tela2">

    <div class="texto">
      essa música me lembra de quando nos aproximamos,
      e hoje tenho certeza que somos coisa de alma 💚
    </div>

    <img src="foto.jpg" class="foto">

  </section>

  <!-- MUSICA -->

  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <script>

    function abrir(){

      document
      .getElementById("tela1")
      .style.display = "none";

      document
      .getElementById("tela2")
      .style.display = "block";

      document
      .getElementById("musica")
      .play();

    }

  </script>

</body>
</html>
