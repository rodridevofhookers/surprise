<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Para Safira 💚</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      background:#1f6b45;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      color:white;
      position:relative;
    }

    canvas{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:5;
    }

    .container{
      text-align:center;
      z-index:2;
      padding:20px;
    }

    h1{
      font-size:3rem;
      margin-bottom:30px;
    }

    .btn{
      background:white;
      color:#1f6b45;
      border:none;
      padding:15px 35px;
      border-radius:40px;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    .mensagem{
      display:none;
      margin-top:20px;
      line-height:1.7;
      max-width:500px;
      animation:aparecer 1s ease;
    }

    .foto{
      display:none;
      margin-top:30px;
      animation:aparecer 1s ease;
    }

    .foto img{
      width:320px;
      border-radius:20px;
      box-shadow:0 0 25px rgba(0,0,0,0.4);
    }

    /* IMAGENS */

    .decoracao{
      position:absolute;
      opacity:0.14;
      z-index:1;
      pointer-events:none;
      display:none;
      animation:aparecer 1s ease;
    }

    .spiderman{
      width:170px;
      top:20px;
      left:20px;
    }

    .harry{
      width:170px;
      bottom:20px;
      right:20px;
    }

    @keyframes aparecer{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

  </style>
</head>

<body>

  <!-- FOGOS -->

  <canvas id="fogos"></canvas>

  <!-- IMAGENS -->

  <img src="spiderman.png"
  class="decoracao spiderman"
  id="spiderman">

  <img src="harry.png"
  class="decoracao harry"
  id="harry">

  <div class="container">

    <h1>Para Safira 💚</h1>

    <button class="btn" onclick="mostrarFoto()">
      abrir
    </button>

    <p class="mensagem" id="mensagem">
      essa música sempre vai me lembrar de quando a gente se aproximou,
      e hoje eu tenho certeza que somos coisa de alma 💚
    </p>

    <div class="foto" id="foto">
      <img src="foto.jpg">
    </div>

  </div>

  <!-- MÚSICA -->

  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <script>

    /* FOGOS */

    const canvas = document.getElementById("fogos");

    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;

    canvas.height = window.innerHeight;

    let particulas = [];

    window.addEventListener("resize", function(){

      canvas.width = window.innerWidth;

      canvas.height = window.innerHeight;

    });

    function mostrarFoto(){

      document.getElementById("foto").style.display = "block";

      document.getElementById("mensagem").style.display = "block";

      document.getElementById("spiderman").style.display = "block";

      document.getElementById("harry").style.display = "block";

      document.getElementById("musica").play();

      criarFogos();

    }

    function criarFogos(){

      for(let i = 0; i < 4; i++){

        setTimeout(function(){

          explosao(

            Math.random() * canvas.width,

            Math.random() * canvas.height * 0.6

          );

        }, i * 350);

      }

    }

    function explosao(x, y){

      const cores = [

        "#ffffff",
        "#ffd700",
        "#ff4d6d",
        "#7cffc4",
        "#9dffb0"

      ];

      for(let i = 0; i < 70; i++){

        particulas.push({

          x:x,
          y:y,

          angulo:Math.random() * Math.PI * 2,

          velocidade:Math.random() * 5 + 2,

          raio:Math.random() * 3 + 2,

          vida:100,

          cor:cores[Math.floor(Math.random() * cores.length)]

        });

      }

    }

    function animar(){

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particulas.forEach(function(p, index){

        p.x += Math.cos(p.angulo) * p.velocidade;

        p.y += Math.sin(p.angulo) * p.velocidade;

        p.velocidade *= 0.96;

        p.vida--;

        ctx.globalAlpha = p.vida / 100;

        ctx.beginPath();

        ctx.arc(p.x, p.y, p.raio, 0, Math.PI * 2);

        ctx.fillStyle = p.cor;

        ctx.fill();

        if(p.vida <= 0){

          particulas.splice(index, 1);

        }

      });

      ctx.globalAlpha = 1;

      requestAnimationFrame(animar);

    }

    animar();

  </script>

</body>

</html>
